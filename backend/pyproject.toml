[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
    "migrations",
    ".venv",
    ".venv-linux",
    "staticfiles",
    "media",
    "logs",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (formatador cuida disso)
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["B011", "SIM105", "N815", "F841"]
"**/tests/*" = ["B011", "SIM105", "N815", "F841"]
"apps/*/serializers.py" = ["N815"]
"apps/documents/tasks.py" = ["B904"]
"apps/core/validators.py" = ["SIM105"]

[tool.mypy]
python_version = "3.13"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true
exclude = ["migrations/", ".venv", ".venv-linux"]
check_untyped_defs = false

[tool.django-stubs]
django_settings_module = "config.settings"
