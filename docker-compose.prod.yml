# =============================================================================
# Docker Compose — Produção
# =============================================================================
# Todos os serviços (backend, frontend, db, redis, celery) rodam em Docker.
# O Nginx do host atua como reverse proxy com SSL, encaminhando:
#   - rotas do site → frontend:80
#   - /api/v1, /django-admin/ → backend:8000
#   - /static/, /media/ → servidos diretamente pelo Nginx do host
#
# Subir com: docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: cavn-db
    restart: unless-stopped
    mem_limit: ${DB_MEM_LIMIT:-512m}
    cpus: ${DB_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${DB_NAME:-cavn_digital}
      POSTGRES_USER: ${DB_USER:-cavn_digital}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env de produção}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cavn_digital} -d ${DB_NAME:-cavn_digital}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cavn-redis
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    cpus: ${REDIS_CPUS:-0.5}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        echo "REDIS_PASSWORD não configurada" >&2;
        exit 1;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
          redis-cli -a "$$REDIS_PASSWORD" ping;
        else
          redis-cli ping;
        fi'
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cavn-backend
    restart: unless-stopped
    mem_limit: ${BACKEND_MEM_LIMIT:-1g}
    cpus: ${BACKEND_CPUS:-2.0}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --worker-class gthread --threads 2 --access-logfile -
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-cavn_digital}
      DB_USER: ${DB_USER:-cavn_digital}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env de produção}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      # As configurações HTTPS/HSTS/cookies seguros são forçadas pelo Django quando
      # DEBUG=False. Não defina defaults inseguros aqui.
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE}
      ADMIN_URL: ${ADMIN_URL:-gerencia/}
      AXES_FAILURE_LIMIT: ${AXES_FAILURE_LIMIT:-5}
      AXES_COOLOFF_TIME_MINUTES: ${AXES_COOLOFF_TIME_MINUTES:-15}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.05}
      REQUIRE_TOKEN_VERSION: ${REQUIRE_TOKEN_VERSION:-True}
      MANDATORY_2FA_FOR_PRIVILEGED: ${MANDATORY_2FA_FOR_PRIVILEGED:-True}
      TWO_FACTOR_ENROLLMENT_TOKEN_LIFETIME_SECONDS: ${TWO_FACTOR_ENROLLMENT_TOKEN_LIFETIME_SECONDS:-600}
      TWO_FACTOR_LOGIN_CHALLENGE_LIFETIME_SECONDS: ${TWO_FACTOR_LOGIN_CHALLENGE_LIFETIME_SECONDS:-300}
      TWO_FACTOR_RECOVERY_CODE_COUNT: ${TWO_FACTOR_RECOVERY_CODE_COUNT:-10}
      USE_X_ACCEL_REDIRECT: ${USE_X_ACCEL_REDIRECT:-True}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      PRIVACY_REQUEST_SLA_DAYS: ${PRIVACY_REQUEST_SLA_DAYS:-15}
      PRIVACY_DPO_NAME: ${PRIVACY_DPO_NAME:-Responsável institucional pela privacidade}
      PRIVACY_DPO_EMAIL: ${PRIVACY_DPO_EMAIL:-cavn@ufpb.br}
      ANTIVIRUS_ENABLED: ${ANTIVIRUS_ENABLED:-False}
      ANTIVIRUS_REQUIRED: ${ANTIVIRUS_REQUIRED:-False}
      ANTIVIRUS_HOST: ${ANTIVIRUS_HOST:-clamav}
      ANTIVIRUS_PORT: ${ANTIVIRUS_PORT:-3310}
      ANTIVIRUS_TIMEOUT_SECONDS: ${ANTIVIRUS_TIMEOUT_SECONDS:-30}
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https", "http://localhost:8000/api/v1/health/ready/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cavn-celery-worker
    restart: unless-stopped
    mem_limit: ${CELERY_WORKER_MEM_LIMIT:-1g}
    cpus: ${CELERY_WORKER_CPUS:-1.5}
    command: celery -A config worker -l info
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-cavn_digital}
      DB_USER: ${DB_USER:-cavn_digital}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env de produção}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.05}
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME --timeout 10 | grep -q OK"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cavn-celery-beat
    restart: unless-stopped
    mem_limit: ${CELERY_BEAT_MEM_LIMIT:-256m}
    cpus: ${CELERY_BEAT_CPUS:-0.25}
    command: celery -A config beat -l info --pidfile=/tmp/celerybeat.pid
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-cavn_digital}
      DB_USER: ${DB_USER:-cavn_digital}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env de produção}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.05}
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cavn-flower
    restart: unless-stopped
    mem_limit: ${FLOWER_MEM_LIMIT:-256m}
    cpus: ${FLOWER_CPUS:-0.25}
    command: celery -A config flower --port=5555 --url-prefix=flower
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-cavn_digital}
      DB_USER: ${DB_USER:-cavn_digital}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env de produção}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:?Defina FLOWER_BASIC_AUTH (usuario:senha) no .env de produção}
    ports:
      - "127.0.0.1:5555:5555"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"$$FLOWER_BASIC_AUTH\" http://localhost:5555/flower/ || curl -fsS http://localhost:5555/flower/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SITE_URL: ${SITE_URL:-https://bibliotecadigital.cchsa-cavn.tec.br}
    container_name: cavn-frontend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    cpus: ${FRONTEND_CPUS:-0.5}
    volumes:
      - ./backend/media:/usr/share/nginx/media:ro
      - ./backend/staticfiles:/usr/share/nginx/static:ro
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - frontend
      - backend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge
    internal: true
