# =============================================================================
# Configuração do Nginx no host (VPS) — Produção
# =============================================================================
# Containers esperados:
#   - frontend → 127.0.0.1:3000
#   - backend  → 127.0.0.1:8000
#
# Comandos úteis:
#   sudo nginx -t
#   sudo systemctl reload nginx
# =============================================================================

# Usa o IP real do visitante quando a requisição chega via Cloudflare.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# Limita requisições em endpoints sensíveis (login, refresh)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=600r/m;
limit_req_status 429;

server {
    server_name bibliotecadigital.cchsa-cavn.tec.br;

    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/bibliotecadigital.cchsa-cavn.tec.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bibliotecadigital.cchsa-cavn.tec.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/cavn-access.log;
    error_log /var/log/nginx/cavn-error.log;

    # Headers de segurança globais
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; img-src 'self' data: blob:; font-src 'self' https://fonts.bunny.net; connect-src 'self' https://fonts.bunny.net https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; media-src 'self';" always;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Arquivos estáticos do Django (servidos diretamente pelo Nginx)
    location /static/ {
        alias /opt/cavn-digital/backend/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Arquivos de mídia de documentos só são servidos após autorização do backend.
    # O auth_request consulta /api/v1/documentos/arquivos/authorize/ para decidir
    # se o arquivo é público ou se o usuário autenticado tem permissão.
    location /media/documentos/ {
        auth_request /api/v1/documentos/arquivos/authorize/;
        alias /opt/cavn-digital/backend/media/documentos/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Endpoint de autorização usado pelo auth_request.
    # Não repassa o body e envia a URI original no header X-Original-Uri.
    location = /api/v1/documentos/arquivos/authorize/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Uri $request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Outros arquivos de mídia (galeria, avatares) permanecem públicos.
    location /media/ {
        alias /opt/cavn-digital/backend/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Location interno usado pelo backend para downloads protegidos via API.
    location /media-protected/ {
        internal;
        alias /opt/cavn-digital/backend/media/;
    }

    # Proteção extra para endpoints de autenticação
    location ~ ^/api/v1/auth/(login|refresh|token)/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        # Evita headers duplicados: o Django SecurityMiddleware já os envia.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;
    }

    # Métricas de navegação não devem bloquear páginas públicas.
    location = /api/v1/analytics/vitals/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;
    }

    # Backend API e admin. O path do admin deve coincidir com ADMIN_URL do .env.
    # Substitua "gerencia" abaixo pelo valor configurado em ADMIN_URL (sem a barra final).
    location ~ ^/(api/v1|gerencia)/ {
        limit_req zone=api burst=120 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        # Evita headers duplicados: o Django SecurityMiddleware já os envia.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;
    }

    # Frontend SPA (React)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_hide_header Content-Security-Policy;
    }
}

server {
    if ($host = bibliotecadigital.cchsa-cavn.tec.br) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name bibliotecadigital.cchsa-cavn.tec.br;
    return 404;
}
