server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Mantém a política correta mesmo quando o container frontend é servido
    # diretamente, sem o Nginx do host como reverse proxy.
    set $frontend_csp "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; img-src 'self' data: blob:; font-src 'self' https://fonts.bunny.net; connect-src 'self' https://fonts.bunny.net https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; media-src 'self';";

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Execução direta via Docker Compose: encaminha backend, mídia e estáticos.
    # Em produção com Nginx no host, essas rotas são tratadas antes do proxy da SPA.
    location = /api/v1/documentos/arquivos/authorize/ {
        proxy_pass http://backend:8000;
        proxy_pass_request_body off;
        proxy_http_version 1.1;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Uri $request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /media/documentos/ {
        auth_request /api/v1/documentos/arquivos/authorize/;
        alias /usr/share/nginx/media/documentos/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    location /media/ {
        alias /usr/share/nginx/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Assets com hash no nome (Vite gera /assets/abc123.js) — imutáveis, cache 1 ano
    location /assets/ {
        expires 1y;
        add_header Content-Security-Policy $frontend_csp always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service Worker — nunca cachear para que o browser receba sempre o mais recente
    location = /sw.js {
        add_header Content-Security-Policy $frontend_csp always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # manifest.json — curto prazo para PWA detectar atualizações
    location = /manifest.json {
        add_header Content-Security-Policy $frontend_csp always;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA entry point — nunca cachear; Cloudflare e browsers devem sempre buscar do servidor
    location = /index.html {
        add_header Content-Security-Policy $frontend_csp always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Todas as rotas do SPA — retorna index.html sem cache
    location / {
        add_header Content-Security-Policy $frontend_csp always;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
