name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cavn_digital_test
          POSTGRES_USER: cavn_digital
          POSTGRES_PASSWORD: cavn_digital
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint com Ruff
        run: ruff check apps config
      - name: Type checking com mypy (não bloqueante nesta fase)
        continue-on-error: true
        run: mypy apps config
      - name: Auditoria de dependências (pip-audit)
        run: |
          pip install --quiet pip-audit
          pip-audit -r requirements.txt
      - name: Testes
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          DB_ENGINE: postgresql
          DB_NAME: cavn_digital_test
          DB_USER: cavn_digital
          DB_PASSWORD: cavn_digital
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: Auditoria de dependências (npm audit)
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Testes
        run: npm run test -- --run
      - name: Build
        run: npm run build
      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium
      - name: Testes E2E
        run: npm run test:e2e
